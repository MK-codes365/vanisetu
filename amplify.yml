version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "--- Environment Variable Diagnostic (Names Only) ---"
        - env | grep VANI_ | cut -d= -f1 || true
        - echo "----------------------------------------------------"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
